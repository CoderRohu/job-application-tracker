<!DOCTYPE html>
<html>

<head>
<title>Job Application Tracker</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
width:200px;
display:inline-block;
margin:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
text-align:center;
}

button{
background:#2563eb;
color:white;
border:none;
padding:10px;
border-radius:5px;
}

input{
padding:10px;
margin:5px;
}

</style>

</head>

<body>

<h1>Job Application Tracker</h1>

<div>

<div class="card">
<h2>12</h2>
<p>Applications</p>
</div>

<div class="card">
<h2>3</h2>
<p>Interviews</p>
</div>

<div class="card">
<h2>1</h2>
<p>Offers</p>
</div>

</div>

<h2>Add Job</h2>

<input placeholder="Company">

<input placeholder="Role">

<button>Add Job</button>

</body>

</html>
